name: Prerelease Build

on:
  push:
    branches: [ develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  actions: read

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '18.x'
  CONFIGURATION: Release
  WORKING_DIRECTORY: UnifiedContacts/UnifiedContacts.Server
  CI: false

jobs:
  build-prerelease:
    runs-on: windows-latest
    if: github.ref == 'refs/heads/develop'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Generate version
      id: version
      run: |
        # Generate a prerelease version based on commit count and short SHA
        try {
          $commitCount = git rev-list --count HEAD 2>$null
          if (-not $commitCount) { $commitCount = "0" }
        }
        catch {
          $commitCount = "0"
        }
        
        try {
          $shortSha = git rev-parse --short HEAD 2>$null
          if (-not $shortSha) { $shortSha = "unknown" }
        }
        catch {
          $shortSha = "unknown"
        }
        
        $version = "v0.0.$commitCount-dev-$shortSha"
        echo "version=$version" >> $env:GITHUB_OUTPUT
        Write-Host "Generated version: $version"
      shell: pwsh

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: UnifiedContacts/unifiedcontacts.client/package-lock.json

    - name: Create lib directory for NuGet local source
      run: |
        New-Item -ItemType Directory -Force -Path "${{ env.WORKING_DIRECTORY }}/lib"
        Write-Host "Created lib directory for NuGet local source"
      shell: pwsh
        
    - name: Restore .NET dependencies
      run: |
        # Create a custom NuGet.Config that only uses nuget.org
        $nugetConfig = @"
        <?xml version="1.0" encoding="utf-8"?>
        <configuration>
          <packageSources>
            <clear />
            <add key="nuget.org" value="https://api.nuget.org/v3/index.json" protocolVersion="3" />
          </packageSources>
        </configuration>
        "@
        
        # Save to a temp file
        $nugetConfig | Out-File -FilePath "./nuget.config" -Encoding UTF8
        
        # Use the custom config for restore
        dotnet restore "${{ env.WORKING_DIRECTORY }}" --configfile "./nuget.config"
      shell: pwsh

    - name: Install Node.js dependencies
      run: |
        cd UnifiedContacts/unifiedcontacts.client
        npm ci

    - name: Build React client
      run: |
        cd UnifiedContacts/unifiedcontacts.client
        npm run build

    - name: Build .NET application
      run: dotnet build "${{ env.WORKING_DIRECTORY }}" --configuration ${{ env.CONFIGURATION }} --no-restore

    - name: Publish .NET application
      run: dotnet publish "${{ env.WORKING_DIRECTORY }}" --configuration ${{ env.CONFIGURATION }} --no-build --output ./publish

    - name: Create prerelease package
      run: |
        # Create binaries directory
        New-Item -ItemType Directory -Force -Path "./binaries"
        Copy-Item -Path "./publish/*" -Destination "./binaries/" -Recurse -Force
        
        # Create version info
        $versionInfo = @{
          version = "${{ steps.version.outputs.version }}"
          buildDate = (Get-Date -Format "yyyy-MM-dd HH:mm:ss UTC")
          commit = "${{ github.sha }}"
          branch = "develop"
          prerelease = $true
        }
        $versionInfo | ConvertTo-Json | Out-File -FilePath "./binaries/version.json" -Encoding UTF8
        
        # Create zip
        Compress-Archive -Path "./binaries/*" -DestinationPath "./binaries.zip" -Force
      shell: pwsh

    - name: Create PowerShell module package
      run: |
        New-Item -ItemType Directory -Force -Path "./publish-module/UnifiedContactsPS"
        Copy-Item -Path "UnifiedContactsPS/*" -Destination "./publish-module/UnifiedContactsPS/" -Recurse -Force
        
        New-Item -ItemType Directory -Force -Path "./publish-module/arm-templates"
        Copy-Item -Path "arm-templates/*" -Destination "./publish-module/arm-templates/" -Recurse -Force
        
        Compress-Archive -Path "./publish-module/*" -DestinationPath "./UnifiedContactsPS.zip" -Force
      shell: pwsh

    - name: Create prerelease
      id: create_prerelease
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.version.outputs.version }}
        name: UnifiedContacts ${{ steps.version.outputs.version }} (Prerelease)
        body: |
          ## 🚀 Prerelease Build from develop branch
          
          This is an automated prerelease build from the `develop` branch.
          
          **⚠️ This is a prerelease version and may contain bugs or incomplete features.**
          
          ### 📋 Build Information
          - 🔖 **Version**: ${{ steps.version.outputs.version }}
          - 🔗 **Commit**: [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
          - 📅 **Build Date**: ${{ github.run_started_at }}
          - 🌿 **Branch**: develop
          - 🏃 **Workflow Run**: [${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          
          ### 📦 Downloads
          - `binaries.zip` - Application binaries for deployment
          - `UnifiedContactsPS.zip` - PowerShell deployment module
          
          ### 🔧 Technical Details
          - 🏗️ Built with .NET ${{ env.DOTNET_VERSION }}
          - ⚛️ React frontend included
          - 📋 Self-contained deployment package
          
          ---
          
          💡 **For production use, please use the [latest stable release](https://github.com/${{ github.repository }}/releases/latest).**
          
          *This prerelease was automatically generated by GitHub Actions* 🤖
        draft: false
        prerelease: true
        files: |
          ./binaries.zip
          ./UnifiedContactsPS.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Clean up old prereleases
      run: |
        try {
          # Authenticate with GitHub CLI
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token 2>$null
          
          # Keep only the latest 5 prereleases
          $releases = $null
          try {
            $releases = gh release list --limit 20 --json tagName,isPrerelease 2>$null | ConvertFrom-Json
          }
          catch {
            Write-Host "Could not fetch releases list: $_"
            exit 0
          }
          
          if ($releases) {
            $prereleases = $releases | Where-Object { $_.isPrerelease -eq $true } | Sort-Object tagName -Descending
            
            if ($prereleases -and $prereleases.Count -gt 5) {
              $toDelete = $prereleases | Select-Object -Skip 5
              foreach ($release in $toDelete) {
                try {
                  Write-Host "Deleting old prerelease: $($release.tagName)"
                  gh release delete $release.tagName --yes --cleanup-tag 2>$null
                  Write-Host "Successfully deleted: $($release.tagName)"
                }
                catch {
                  Write-Host "Failed to delete $($release.tagName): $_"
                }
              }
              Write-Host "Cleanup completed"
            } else {
              Write-Host "No prereleases to clean up (less than 5 prereleases found)"
            }
          } else {
            Write-Host "No releases found to clean up"
          }
        } catch {
          Write-Host "Error during cleanup: $_"
          Write-Host "Cleanup step failed but continuing workflow"
        }
      shell: pwsh
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true
